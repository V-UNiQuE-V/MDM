<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Demo</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0ea5e9, #38bdf8 50%, #67e8f9);
    display: grid;
    place-items: center;
    color: #0f172a;
}

.container {
    background: white;
    padding: 22px;
    width: 90%;
    max-width: 460px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 14px 35px rgba(2, 6, 23, 0.18);
}

input {
    box-sizing: border-box;
    padding: 11px;
    width: 67%;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    outline: none;
}

button {
    padding: 11px 14px;
    margin: 5px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    transition: background 0.2s ease;
}

button:hover {
    background: #1d4ed8;
}

.weather img {
    width: 84px;
}

.forecast {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
    margin-top: 20px;
}

.forecast div {
    background: #f1f5f9;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
}

.forecast img {
    width: 46px;
}

#weatherResult {
    min-height: 120px;
    margin-top: 14px;
}

@media (max-width: 520px) {
    input {
        width: 100%;
    }

    button {
        width: 100%;
        margin: 10px 0 0;
    }

    .forecast {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>Weather Dashboard (Demo)</h2>

    <input type="text" id="city" placeholder="Enter city">
    <button onclick="getWeather()">Search</button>

    <div class="weather" id="weatherResult"></div>
    <div class="forecast" id="forecast"></div>
</div>

<script>
// Mock Weather Data
const weatherData = {
    Mumbai: {
        temp: 30,
        condition: "Clouds",
        icon: "https://openweathermap.org/img/wn/03d@2x.png"
    },
    Delhi: {
        temp: 35,
        condition: "Sunny",
        icon: "https://openweathermap.org/img/wn/01d@2x.png"
    },
    Pune: {
        temp: 28,
        condition: "Rain",
        icon: "https://openweathermap.org/img/wn/10d@2x.png"
    }
};

function getWeather() {
    const city = document.getElementById("city").value;

    if (!weatherData[city]) {
        document.getElementById("weatherResult").innerHTML = "❌ City not found (Demo)";
        document.getElementById("forecast").innerHTML = "";
        return;
    }

    const data = weatherData[city];

    document.getElementById("weatherResult").innerHTML = `
        <h3>${city}</h3>
        <img src="${data.icon}">
        <p>${data.condition}</p>
        <p>${data.temp} °C</p>
    `;

    // Fake 5-day forecast
    let forecastHTML = "";
    for (let i = 1; i <= 5; i++) {
        forecastHTML += `
            <div>
                <p>Day ${i}</p>
                <img src="${data.icon}">
                <p>${data.temp + i} °C</p>
            </div>
        `;
    }

    document.getElementById("forecast").innerHTML = forecastHTML;
}

// Auto load Mumbai
window.onload = () => getWeatherByDefault();

function getWeatherByDefault() {
    document.getElementById("city").value = "Mumbai";
    getWeather();
}
</script>

</body>
</html>
